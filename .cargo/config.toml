[build]
target = "riscv32imc-esp-espidf"

[target.riscv32imc-esp-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32c3"
ESP_IDF_VERSION = "v5.3.1"  # ← v5.3.1 (pas v5.3.3)
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "sdkconfig.defaults" }
